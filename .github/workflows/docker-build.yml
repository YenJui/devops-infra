name: Build and Push Runner Image

on:
  push:
    branches: [ main ]
    paths:
      - 'runners/base/**'
  workflow_dispatch:
    inputs:
      dagger_version:
        description: 'Dagger version to install'
        required: true
        default: '0.12.0'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/devops-runner

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ github.event.inputs.dagger_version || '0.12.0' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./runners/base
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            DAGGER_VERSION=${{ github.event.inputs.dagger_version || '0.12.0' }}
