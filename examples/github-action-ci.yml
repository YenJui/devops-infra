name: Dagger CI Example

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  dagger-ci:
    # Match the label generated by our custom runner
    runs-on: [self-hosted, "dagger:0.12.0"]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Run Dagger Pipeline
        env:
          DAGGER_CLOUD_TOKEN: ${{ secrets.DAGGER_CLOUD_TOKEN }} # Optional
        run: |
          # The dagger CLI is pre-installed in our custom runner image
          dagger run go run ci/main.go
